<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="AI工具雷达是面向中文用户的原创 AI 工具导航、榜单和厂商增长平台。"
    />
    <title>AI工具雷达 - 精选 AI 工具导航平台</title>
    <link rel="preconnect" href="https://www.google.com" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到主要内容</a>

    <header class="site-header">
      <a class="brand" href="#main" aria-label="AI工具雷达首页">
        <span class="brand-mark" aria-hidden="true">AI</span>
        <span class="brand-name">AI工具集</span>
      </a>

      <nav class="primary-nav" aria-label="主导航">
        <a href="#hot" class="is-active">热门推荐</a>
      </nav>

      <div class="header-search" role="search">
        <label class="sr-only" for="globalSearch">搜索 AI 工具</label>
        <input id="globalSearch" type="search" autocomplete="off" placeholder="搜索" />
      </div>

      <div class="header-actions">
        <button class="button button-ghost compact-action" id="openSubmit" type="button">
          <span class="iconfont icon-add_circle button-icon" aria-hidden="true"></span>
          提交工具
        </button>
        <button class="button button-primary compact-action" id="joinButton" type="button">
          <span class="iconfont icon-account_circle button-icon" aria-hidden="true"></span>
          登录/注册
        </button>
        <button class="icon-button mobile-only" id="mobileSearchToggle" type="button" aria-label="打开搜索">
          <span class="iconfont icon-search" aria-hidden="true"></span>
        </button>
        <button class="icon-button mobile-only" id="mobileMenuToggle" type="button" aria-label="打开分类菜单">
          <span class="iconfont icon-menu" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <div class="mobile-search-panel" id="mobileSearchPanel" role="search" aria-label="移动端搜索">
      <label class="sr-only" for="mobileSearch">搜索工具、分类或场景</label>
      <input id="mobileSearch" type="search" autocomplete="off" placeholder="搜索工具、分类或场景" />
    </div>

    <main class="app-shell" id="main">
      <aside class="category-sidebar" aria-label="工具分类">
        <div class="sidebar-inner">
          <div class="sidebar-title">工具导航</div>
          <nav class="category-nav" id="categoryNav" aria-label="AI 工具分类"></nav>
          <button class="button button-primary sidebar-cta" type="button" data-plan="购买 Featured 推荐位">
            <span class="iconfont icon-workspace_premium button-icon" aria-hidden="true"></span>
            购买推荐位
          </button>
        </div>
      </aside>

      <section class="content-column">
        <section class="hero" aria-labelledby="heroTitle">
          <div class="hero-copy">
            <p class="eyebrow">精选可用工具 · 原创导航 · 每周更新</p>
            <h1 id="heroTitle">帮你更快找到真正好用的 AI 工具</h1>
          </div>
          <div class="hero-search" role="search">
            <label class="sr-only" for="heroSearch">请输入要搜索的 AI 产品</label>
            <input id="heroSearch" type="search" autocomplete="off" placeholder="请输入要搜索的 AI 产品" />
            <button class="icon-button search-submit" id="heroSearchButton" type="button" aria-label="搜索">
              <span class="iconfont icon-search" aria-hidden="true"></span>
            </button>
          </div>

        </section>

        <section class="tool-section" id="hot" aria-labelledby="hotTitle">
          <div class="section-heading">
            <h2 id="hotTitle">热门推荐</h2>
            <button class="text-button" type="button" data-plan="热门推荐位咨询">
              查看更多
              <span class="iconfont icon-arrow_forward inline-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div class="tool-grid" id="hotTools"></div>
        </section>

        <div class="category-sections" id="categorySections"></div>

        <section class="growth-band" id="growth" aria-labelledby="growthTitle">
          <div>
            <p class="eyebrow">商业收入闭环</p>
            <h2 id="growthTitle">从用户找工具，到厂商获客</h2>
            <p>首页推荐位、付费收录、会员工具库、行业报告、社群运营和企业线索，第一版全部做成可点击前端流程。</p>
          </div>
          <div class="offer-grid" id="offerGrid"></div>
        </section>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong>AI工具雷达</strong>
        <p>原创 AI 工具导航原型，不复用第三方品牌素材或受保护内容。</p>
      </div>
      <div class="footer-actions">
        <button class="text-button" type="button" data-plan="免费提交工具">
          <span class="iconfont icon-add_circle inline-icon" aria-hidden="true"></span>
          提交工具
        </button>
        <button class="text-button" type="button" data-plan="企业线索合作">
          <span class="iconfont icon-handshake inline-icon" aria-hidden="true"></span>
          企业合作
        </button>
        <button class="text-button" type="button" data-plan="会员订阅">
          <span class="iconfont icon-workspace_premium inline-icon" aria-hidden="true"></span>
          会员订阅
        </button>
      </div>
    </footer>

    <div class="mobile-menu-backdrop" id="mobileMenuBackdrop" hidden></div>
    <aside class="mobile-menu" id="mobileMenu" aria-label="移动端分类菜单" aria-hidden="true">
      <div class="mobile-menu-header">
        <strong>工具分类</strong>
        <button class="icon-button" id="closeMobileMenu" type="button" aria-label="关闭分类菜单">
          <span class="iconfont icon-close" aria-hidden="true"></span>
        </button>
      </div>
      <nav id="mobileCategoryNav" class="category-nav" aria-label="移动端 AI 工具分类"></nav>
      <button class="button button-primary" type="button" data-plan="购买 Featured 推荐位">
        <span class="iconfont icon-workspace_premium button-icon" aria-hidden="true"></span>
        购买推荐位
      </button>
    </aside>

    <section class="tool-drawer" id="toolDrawer" aria-live="polite" aria-label="工具详情预览"></section>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <dialog class="lead-modal" id="leadModal" aria-labelledby="modalTitle">
      <form method="dialog">
        <div class="modal-header">
          <div>
            <p>商业合作</p>
            <h2 id="modalTitle">提交工具或购买推广</h2>
          </div>
          <button class="icon-button" value="close" aria-label="关闭弹窗" type="submit">
            <span class="iconfont icon-close" aria-hidden="true"></span>
          </button>
        </div>
        <div class="modal-grid">
          <label>
            工具/公司名称
            <input id="leadName" type="text" placeholder="例如：你的 AI 产品" />
          </label>
          <label>
            官网链接
            <input type="url" placeholder="https://example.com" />
          </label>
          <label>
            合作目标
            <select id="leadGoal">
              <option>免费提交工具</option>
              <option>付费收录</option>
              <option>购买 Featured 推荐位</option>
              <option>会员订阅</option>
              <option>获取行业报告</option>
              <option>加入社群</option>
              <option>企业线索合作</option>
            </select>
          </label>
          <label>
            联系方式
            <input type="email" placeholder="name@company.com" />
          </label>
        </div>
        <label class="modal-note">
          补充需求
          <textarea rows="4" placeholder="预算、投放目标、目标用户或想优先曝光的分类"></textarea>
        </label>
        <div class="modal-footer">
          <button class="button button-ghost" value="cancel" type="submit">
            <span class="iconfont icon-schedule button-icon" aria-hidden="true"></span>
            稍后再说
          </button>
          <button class="button button-primary" id="submitLead" value="submit" type="submit">
            <span class="iconfont icon-send button-icon" aria-hidden="true"></span>
            提交合作需求
          </button>
        </div>
      </form>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
