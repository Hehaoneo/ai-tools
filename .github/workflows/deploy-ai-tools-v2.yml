name: Deploy ai-tools-v2 to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "ai-tools-v2/**"
      - ".github/workflows/deploy-ai-tools-v2.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload ai-tools-v2
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-tools-v2

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
